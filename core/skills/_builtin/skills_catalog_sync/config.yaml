name: skills_catalog_sync
description: "Sincroniza catálogo de skills externos (check/apply) com diff auditável."
version: "1.0.0"
security_level: moderate
triggers:
  - sync catalogo
  - sincronizar catalogo
  - atualizar catalogo
  - catalog sync
  - skills externas
parameters:
  mode:
    type: string
    required: false
    description: "Modo de execução: check (default) ou apply"
  source:
    type: string
    required: false
    description: "Nome de uma fonte específica para sincronizar"
parameters_schema:
  mode:
    type: string
    description: "check para detectar mudanças, apply para persistir mudanças"
    required: false
  source:
    type: string
    description: "Nome da fonte (opcional)"
    required: false
max_output_chars: 3000
timeout_seconds: 45
enabled: true
